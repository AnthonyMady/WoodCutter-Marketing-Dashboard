name: Sync Marketing Data

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch & sync data
        env:
          SUPERMETRICS_API_KEY:          ${{ secrets.SUPERMETRICS_API_KEY }}
          SUPERMETRICS_USER:             ${{ secrets.SUPERMETRICS_USER }}
          SPREADSHEET_ID:                ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python pipeline/fetch_and_sync.py
